services:

  ollama:
    image: ollama/ollama
    container_name: epc_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama
    container_name: epc_ollama_init
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo Waiting for Ollama server...;
        sleep 10;
        ollama pull mistral:7b;
        echo Model ready.;
      "
    depends_on:
      ollama:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: epc_postgres
    environment:
      POSTGRES_USER: epc
      POSTGRES_PASSWORD: epc123
      POSTGRES_DB: epcdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epc -d epcdb"]
      interval: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant
    container_name: epc_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  api:
    build: ./api
    container_name: epc_api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - POSTGRES_URL=postgresql://epc:epc123@postgres:5432/epcdb
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
        
    volumes:
      - ./api:/app
      - uploaded_docs:/app/uploads

  frontend:
    build: ./frontend
    container_name: epc_frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  ollama_data:
  postgres_data:
  qdrant_data:
  uploaded_docs: